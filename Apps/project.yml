name: FlickSlides
options:
  bundleIdPrefix: com.kristianniemi
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  FlickSlidesKit:
    path: ..

targets:
  # ============================================
  # watchOS App
  # ============================================
  FlickSlidesWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch/Sources
    info:
      path: Watch/Info.plist
    entitlements:
      path: Watch/FlickSlidesWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristianniemi.FlickSlides.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.kristianniemi.FlickSlides
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: true
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: FlickSlidesKit
    capabilities:
      - HealthKit:
          capabilities:
            - background-delivery

  # ============================================
  # iOS App
  # ============================================
  FlickSlidesPhone:
    type: application
    platform: iOS
    sources:
      - path: Phone/Sources
    info:
      path: Phone/Info.plist
    entitlements:
      path: Phone/FlickSlidesPhone.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristianniemi.FlickSlides
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: FlickSlidesKit
      - target: FlickSlidesWatch

  # ============================================
  # macOS App
  # ============================================
  FlickSlidesMac:
    type: application
    platform: macOS
    sources:
      - path: Mac/Sources
    info:
      path: Mac/Info.plist
    entitlements:
      path: Mac/FlickSlidesMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristianniemi.FlickSlidesMac
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "Developer ID Application"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: FlickSlidesKit

schemes:
  FlickSlides:
    build:
      targets:
        FlickSlidesPhone: all
        FlickSlidesWatch: all
        FlickSlidesMac: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
